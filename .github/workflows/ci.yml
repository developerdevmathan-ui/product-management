name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    name: Laravel Quality Gate
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: product_management_testing
          MARIADB_USER: product_management
          MARIADB_PASSWORD: secret
          MARIADB_ROOT_PASSWORD: root_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uproduct_management -psecret --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      APP_DEBUG: false
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: product_management_testing
      DB_USERNAME: product_management
      DB_PASSWORD: secret
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      REDIS_HOST: 127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, pdo_mysql, redis, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Build frontend assets
        run: npm run build

      - name: PSR-12 formatting
        run: vendor/bin/pint --test

      - name: Raw SQL scan
        run: |
          ! grep -RInE "whereRaw|orderByRaw|selectRaw|havingRaw|groupByRaw|fromRaw|DB::raw|statement\(|unprepared\(" app routes resources database config bootstrap

      - name: Raw Blade output scan
        run: |
          ! grep -RIn "{!!" resources app

      - name: Composer security audit
        run: composer audit --locked

      - name: npm security audit
        run: npm audit --audit-level=moderate

      - name: Test
        run: php artisan test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config

      - name: Build Docker images
        run: docker compose build
