services:
  setup:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: "no"
    working_dir: /var/www/html
    init: true
    command: docker-setup
    environment: &app-environment
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${DOCKER_APP_URL:-http://localhost:8080}
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-product_management}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-change_me_strong_db_password}
      DOCKER_DB_PASSWORD: ${DOCKER_DB_PASSWORD:-change_me_strong_db_password}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_strong_root_password}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-developerdevmathan@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-developerdevmathan@gmail.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Laravel}
      RUN_NODE_INSTALL: ${RUN_NODE_INSTALL:-true}
      RUN_FRONTEND_BUILD: ${RUN_FRONTEND_BUILD:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-false}
      CONFIRM_RUN_SEEDERS: ${CONFIRM_RUN_SEEDERS:-no}
      RUN_STORAGE_LINK: ${RUN_STORAGE_LINK:-true}
      RUN_OPTIMIZE: ${RUN_OPTIMIZE:-false}
      WAIT_FOR_DATABASE: ${WAIT_FOR_DATABASE:-true}
      DB_WAIT_ATTEMPTS: ${DB_WAIT_ATTEMPTS:-60}
      DB_WAIT_SLEEP_SECONDS: ${DB_WAIT_SLEEP_SECONDS:-2}
      NPM_INSTALL_COMMAND: ${NPM_INSTALL_COMMAND:-npm install}
    volumes: &app-volumes
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - node-modules-data:/var/www/html/node_modules
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - public-build-data:/var/www/html/public/build
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    environment:
      <<: *app-environment
    volumes: *app-volumes
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f .env && test -f vendor/autoload.php && test -f public/build/manifest.json && test -f storage/framework/setup-complete && php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - storage-data:/var/www/html/storage:ro
      - public-build-data:/var/www/html/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      MARIADB_USER: ${DOCKER_DB_USERNAME:-product_management}
      MARIADB_PASSWORD: ${DOCKER_DB_PASSWORD:-change_me_strong_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_strong_root_password}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} -e 'SELECT 1' $${MARIADB_DATABASE} >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ] && [ "$${REDIS_PASSWORD}" != "null" ];
      then redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ] && [ \"$${REDIS_PASSWORD}\" != \"null\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    environment:
      <<: *app-environment
    volumes: *app-volumes
    depends_on:
      setup:
        condition: service_completed_successfully
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    command: php artisan schedule:work
    environment:
      <<: *app-environment
    volumes: *app-volumes
    depends_on:
      setup:
        condition: service_completed_successfully
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mariadb-data:
  redis-data:
  vendor-data:
  node-modules-data:
  storage-data:
  bootstrap-cache:
  public-build-data:
