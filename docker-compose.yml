services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${DOCKER_APP_URL:-http://localhost:8080}
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-product_management}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - storage-data:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      MARIADB_USER: ${DOCKER_DB_USERNAME:-product_management}
      MARIADB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$${REDIS_PASSWORD}" ] && [ "$${REDIS_PASSWORD}" != "null" ];
      then redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}";
      else redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
    ports:
      - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ] && [ \"$${REDIS_PASSWORD}\" != \"null\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-product_management}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    init: true
    command: php artisan schedule:work
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-product_management}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-product_management}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DOCKER_REDIS_PASSWORD:-null}
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  mariadb-data:
  redis-data:
  vendor-data:
  storage-data:
  bootstrap-cache:
